version: "3.8"
services:
  # v0.4.16 — named `bankbridge-db`, NOT `db`. The service name becomes a Docker
  # network alias, and on Umbrel every app shares ONE network: when several apps
  # each call their database `db`, that alias resolves to all of them and libpq
  # picks whichever the DNS answer happens to list first. A foreign Postgres
  # then rejects our credentials with "password authentication failed", the
  # symptom misdiagnosed as APP_SEED drift for five releases. Prefixing with the
  # app name is the same convention CLAUDE.md mandates for Funnel paths.
  # Renaming is safe: the data lives on the named volume below, not the service.
  bankbridge-db:
    image: postgres:16-alpine
    container_name: bankbridge_db
    restart: on-failure
    environment:
      POSTGRES_USER: bankbridge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-postgres-password}
      POSTGRES_DB: bankbridge
      # v0.3.5 — POSTGRES_USER=bankbridge makes `bankbridge` the ONLY superuser,
      # so if its password ever drifts nothing can log in to reset it. The init
      # script mounted below creates a deterministic RESCUE superuser
      # (`bridgeadmin`, password = HMAC(APP_SEED, salt)) on FIRST init so the
      # app's boot self-heal (app/db_recovery.py) can always reconnect and repair
      # the drift. These feed that script + the app-side derivation; keep them in
      # sync with the server's DB_RESCUE_* below.
      DB_RESCUE_USER: ${DB_RESCUE_USER:-bridgeadmin}
      DB_RESCUE_SALT: ${DB_RESCUE_SALT:-bankbridge-rescue-v1}
      DB_RESCUE_SEED: ${POSTGRES_PASSWORD:-dev-postgres-password}
    volumes:
      - bankbridge_pgdata:/var/lib/postgresql/data
      # Runs ONCE on a fresh volume — creates the bridgeadmin rescue superuser.
      - ./scripts/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankbridge -d bankbridge"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build: .
    container_name: bankbridge
    depends_on:
      bankbridge-db:
        condition: service_healthy
    ports:
      - "5202:5202"
    environment:
      DATA_DIR: /data
      SECRET_KEY: ${SECRET_KEY:-dev-not-for-production}
      DATABASE_URL: postgresql://bankbridge:${POSTGRES_PASSWORD:-dev-postgres-password}@bankbridge-db:5432/bankbridge
      # Plaid — blank by default; configure at /admin/plaid_settings (persisted
      # to the data volume, wins over these). Set here only for a headless run.
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      PLAID_REDIRECT_URI: ${PLAID_REDIRECT_URI:-http://umbrel.local:5202/bankbridge/plaid/oauth_return}
      # ERPNext — blank by default; configure at /admin/erpnext_settings.
      ERPNEXT_URL: ${ERPNEXT_URL:-http://umbrel.local:5300}
      ERPNEXT_API_KEY: ${ERPNEXT_API_KEY:-}
      ERPNEXT_API_SECRET: ${ERPNEXT_API_SECRET:-}
      ERPNEXT_DEFAULT_COMPANY: ${ERPNEXT_DEFAULT_COMPANY:-}
      # Fernet key for access-token encryption — blank autogenerates + persists
      # to {DATA_DIR}/fernet.key. Set to pin/rotate a known key.
      FERNET_KEY: ${FERNET_KEY:-}
      SYNC_INTERVAL_HOURS: ${SYNC_INTERVAL_HOURS:-6}
      # v0.3.5 — boot self-heal of app-role password drift. The rescue user +
      # salt + seed must match the db service above so the app re-derives the
      # same bridgeadmin password. DB_RESCUE_SEED defaults (in config.py) to
      # POSTGRES_PASSWORD then SECRET_KEY — both APP_SEED — so it's set here
      # implicitly; pass it explicitly only if you override the seed.
      AUTO_RECOVER_DB_AUTH: ${AUTO_RECOVER_DB_AUTH:-true}
      DB_RESCUE_USER: ${DB_RESCUE_USER:-bridgeadmin}
      DB_RESCUE_SALT: ${DB_RESCUE_SALT:-bankbridge-rescue-v1}
      DB_RESCUE_SEED: ${POSTGRES_PASSWORD:-dev-postgres-password}
    volumes:
      # /data holds the Fernet key + plaid/erpnext settings JSON + scheduler
      # lock. Postgres data lives on its own named volume above.
      - bankbridge_data:/data

volumes:
  bankbridge_data:
  bankbridge_pgdata:
